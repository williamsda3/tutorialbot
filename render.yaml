services:
  - type: web
    name: portfoliobot
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: portfoliobot-data
      mountPath: /var/data
      sizeGB: 1
