<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Analysis Project Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2035;
  --bg-input: #0d1225;
  --border: #1e2a45;
  --border-active: #3b6cf5;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a8;
  --text-muted: #5a6478;
  --accent: #3b6cf5;
  --accent-glow: rgba(59, 108, 245, 0.15);
  --accent-soft: #2a4bb8;
  --green: #34d399;
  --green-bg: rgba(52, 211, 153, 0.08);
  --amber: #fbbf24;
  --amber-bg: rgba(251, 191, 36, 0.08);
  --code-bg: #0c1020;
  --user-msg: #1c2a4a;
  --bot-msg: #111827;
  --scrollbar-track: #111827;
  --scrollbar-thumb: #2a3550;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

.app-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
}

.sidebar-header p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.progress-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.progress-bar-track {
  height: 4px;
  background: var(--bg-primary);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.progress-text {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
}

.steps-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 10px;
}

.steps-nav::-webkit-scrollbar { width: 4px; }
.steps-nav::-webkit-scrollbar-track { background: transparent; }
.steps-nav::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

.step-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 2px;
}

.step-item:hover { background: rgba(59, 108, 245, 0.05); }
.step-item.active { background: var(--accent-glow); }

.step-number {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 1px;
  border: 1.5px solid var(--border);
  color: var(--text-muted);
  background: var(--bg-primary);
  transition: all 0.3s;
}

.step-item.active .step-number {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

.step-item.completed .step-number {
  border-color: var(--green);
  color: var(--bg-primary);
  background: var(--green);
}

.step-item.completed .step-number::after {
  content: '✓';
  font-size: 12px;
}

.step-item.completed .step-number span { display: none; }

.step-info h3 {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  line-height: 1.4;
  transition: color 0.2s;
}

.step-item.active .step-info h3 { color: var(--text-primary); }
.step-item.completed .step-info h3 { color: var(--green); }

.step-info p {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Chat Area */
.chat-area {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg-primary);
}

.chat-header {
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-secondary);
}

.chat-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bot-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.chat-header-left h2 {
  font-size: 15px;
  font-weight: 600;
}

.chat-header-left span {
  font-size: 12px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 4px;
}

.chat-header-left span::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.reset-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.reset-btn:hover {
  border-color: var(--text-muted);
  color: var(--text-primary);
}

.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  scroll-behavior: smooth;
}

.messages-container::-webkit-scrollbar { width: 6px; }
.messages-container::-webkit-scrollbar-track { background: transparent; }
.messages-container::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 6px; }

.message {
  margin-bottom: 16px;
  display: flex;
  gap: 12px;
  animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { justify-content: flex-end; }

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 2px;
}

.message.bot .msg-avatar {
  background: linear-gradient(135deg, var(--accent), #6366f1);
}

.msg-content {
  max-width: 680px;
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-primary);
}

.message.bot .msg-content {
  background: var(--bot-msg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.message.user .msg-content {
  background: var(--user-msg);
  border: 1px solid rgba(59, 108, 245, 0.2);
  border-bottom-right-radius: 4px;
}

.msg-content p { margin-bottom: 10px; }
.msg-content p:last-child { margin-bottom: 0; }

.msg-content strong { color: var(--accent); font-weight: 600; }

.msg-content code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  background: var(--code-bg);
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--green);
}

.msg-content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 10px 0;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--text-secondary);
}

.msg-content ul, .msg-content ol {
  margin: 8px 0;
  padding-left: 20px;
}

.msg-content li {
  margin-bottom: 4px;
  color: var(--text-secondary);
}

.msg-content li strong { color: var(--text-primary); }

.msg-content .tip-block {
  background: var(--amber-bg);
  border-left: 3px solid var(--amber);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  margin: 10px 0;
  font-size: 13px;
  color: var(--text-secondary);
}

.msg-content .tip-block strong {
  color: var(--amber);
}

/* Quick Actions */
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.quick-action-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.25s;
}

.quick-action-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
  transform: translateY(-1px);
}

/* Typing Indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typingBounce 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Input Area */
.input-area {
  padding: 16px 28px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
}

.input-wrapper {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-field {
  flex: 1;
  padding: 13px 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  resize: none;
  min-height: 46px;
  max-height: 120px;
  transition: border-color 0.2s;
  line-height: 1.5;
}

.input-field::placeholder { color: var(--text-muted); }
.input-field:focus { border-color: var(--accent); }

.send-btn {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.send-btn:hover { background: var(--accent-soft); transform: scale(1.04); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.upload-btn {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
}

.upload-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

.upload-btn input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.image-preview-bar {
  display: flex;
  gap: 8px;
  padding: 8px 0 4px;
  flex-wrap: wrap;
}

.image-preview-item {
  position: relative;
  width: 64px;
  height: 64px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.image-preview-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.image-preview-remove {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  border: none;
  color: white;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: background 0.15s;
}

.image-preview-remove:hover { background: #ef4444; }

.msg-image {
  max-width: 300px;
  border-radius: 10px;
  margin: 8px 0;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s;
}

.msg-image:hover { transform: scale(1.02); }

.image-lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
  animation: fadeIn 0.2s;
  backdrop-filter: blur(4px);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.image-lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.input-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
  text-align: center;
}

/* Mobile */
@media (max-width: 768px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .messages-container { padding: 16px; }
  .input-area { padding: 12px 16px 16px; }
  .chat-header { padding: 12px 16px; }
}
</style>
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Sleep Quality<br>Analysis Project</h1>
      <p>Interactive Guide</p>
    </div>
    <div class="progress-section">
      <div class="progress-label">Progress</div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Step 0 of 7</div>
    </div>
    <div class="steps-nav" id="stepsNav"></div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="bot-avatar">🧠</div>
        <div>
          <h2>Project Guide</h2>
          <span>Online</span>
        </div>
      </div>
      <button class="reset-btn" onclick="resetChat()">Reset</button>
    </div>
    <div class="messages-container" id="messages"></div>
    <div class="input-area">
      <div id="imagePreviewBar" class="image-preview-bar" style="display:none;"></div>
      <div class="input-wrapper">
        <div class="upload-btn" title="Upload screenshot">
          📎
          <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageUpload(event)">
        </div>
        <textarea class="input-field" id="userInput" placeholder="Ask a question, upload a screenshot, or type 'next'..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line · 📎 to attach screenshots</div>
    </div>
  </div>
</div>

<script>
const STEPS = [
  { title: "Environment Setup", desc: "Tools & data download" },
  { title: "Data Cleaning", desc: "Prepare & transform" },
  { title: "Exploratory Analysis", desc: "Distributions & patterns" },
  { title: "Deep-Dive Analysis", desc: "Key questions answered" },
  { title: "Dashboard", desc: "Interactive visuals" },
  { title: "Stakeholder Memo", desc: "Business communication" },
  { title: "Polish & Publish", desc: "GitHub & interview prep" },
];

let currentStep = -1;
let isTyping = false;
let conversationHistory = [];
let pendingImages = []; // {base64, mediaType, previewUrl}

// --- Persistence helpers ---
function saveState() {
  try {
    localStorage.setItem('guide_currentStep', JSON.stringify(currentStep));
    localStorage.setItem('guide_conversationHistory', JSON.stringify(conversationHistory));
    localStorage.setItem('guide_chatHTML', document.getElementById('messages').innerHTML);
  } catch (e) { /* storage full or unavailable — silently skip */ }
}

function loadState() {
  try {
    const step = localStorage.getItem('guide_currentStep');
    const history = localStorage.getItem('guide_conversationHistory');
    const html = localStorage.getItem('guide_chatHTML');
    if (step !== null && history !== null && html !== null) {
      currentStep = JSON.parse(step);
      conversationHistory = JSON.parse(history);
      return html;
    }
  } catch (e) { /* corrupt data — start fresh */ }
  return null;
}

function clearState() {
  localStorage.removeItem('guide_currentStep');
  localStorage.removeItem('guide_conversationHistory');
  localStorage.removeItem('guide_chatHTML');
}

function handleImageUpload(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    if (!file.type.startsWith('image/')) return;
    if (pendingImages.length >= 4) return; // max 4 images

    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      const mediaType = file.type;
      const previewUrl = dataUrl;

      pendingImages.push({ base64, mediaType, previewUrl });
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = ''; // reset so same file can be re-selected
}

function renderImagePreviews() {
  const bar = document.getElementById('imagePreviewBar');
  if (pendingImages.length === 0) {
    bar.style.display = 'none';
    bar.innerHTML = '';
    return;
  }
  bar.style.display = 'flex';
  bar.innerHTML = pendingImages.map((img, i) => `
    <div class="image-preview-item">
      <img src="${img.previewUrl}" alt="Preview">
      <button class="image-preview-remove" onclick="removeImage(${i})">×</button>
    </div>
  `).join('');
}

function removeImage(index) {
  pendingImages.splice(index, 1);
  renderImagePreviews();
}

function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'image-lightbox';
  lb.innerHTML = `<img src="${src}" alt="Full size">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

// Drag and drop support
document.addEventListener('DOMContentLoaded', () => {
  const chatArea = document.querySelector('.chat-area');

  chatArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    chatArea.style.outline = '2px dashed var(--accent)';
    chatArea.style.outlineOffset = '-4px';
  });

  chatArea.addEventListener('dragleave', () => {
    chatArea.style.outline = 'none';
  });

  chatArea.addEventListener('drop', (e) => {
    e.preventDefault();
    chatArea.style.outline = 'none';
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files.length === 0) return;

    files.forEach(file => {
      if (pendingImages.length >= 4) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        pendingImages.push({
          base64: ev.target.result.split(',')[1],
          mediaType: file.type,
          previewUrl: ev.target.result,
        });
        renderImagePreviews();
      };
      reader.readAsDataURL(file);
    });
  });

  // Paste support
  document.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData?.items || []);
    const imageItems = items.filter(i => i.type.startsWith('image/'));
    if (imageItems.length === 0) return;

    e.preventDefault();
    imageItems.forEach(item => {
      if (pendingImages.length >= 4) return;
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (ev) => {
        pendingImages.push({
          base64: ev.target.result.split(',')[1],
          mediaType: file.type,
          previewUrl: ev.target.result,
        });
        renderImagePreviews();
      };
      reader.readAsDataURL(file);
    });
  });
});

function renderSteps() {
  const nav = document.getElementById('stepsNav');
  nav.innerHTML = STEPS.map((s, i) => `
    <div class="step-item ${i < currentStep ? 'completed' : ''} ${i === currentStep ? 'active' : ''}" onclick="goToStep(${i})">
      <div class="step-number"><span>${i + 1}</span></div>
      <div class="step-info">
        <h3>${s.title}</h3>
        <p>${s.desc}</p>
      </div>
    </div>
  `).join('');

  const pct = currentStep < 0 ? 0 : Math.round(((currentStep + 1) / STEPS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Step ${Math.max(0, currentStep + 1)} of ${STEPS.length}`;
  saveState();
}

function addMessage(content, type = 'bot', showActions = null) {
  const container = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = `message ${type}`;

  let actionsHTML = '';
  if (showActions && type === 'bot') {
    actionsHTML = `<div class="quick-actions">${showActions.map(a => 
      `<button class="quick-action-btn" onclick="handleQuickAction('${a.replace(/'/g, "\\'")}')">${a}</button>`
    ).join('')}</div>`;
  }

  if (type === 'bot') {
    msg.innerHTML = `
      <div class="msg-avatar">🧠</div>
      <div class="msg-content">${content}${actionsHTML}</div>
    `;
  } else {
    msg.innerHTML = `<div class="msg-content">${content}</div>`;
  }

  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  saveState();
}

function showTyping() {
  const container = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.id = 'typing-msg';
  msg.innerHTML = `
    <div class="msg-avatar">🧠</div>
    <div class="msg-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

async function botRespond(content, actions = null, delay = 600) {
  isTyping = true;
  showTyping();
  await new Promise(r => setTimeout(r, delay));
  removeTyping();
  addMessage(content, 'bot', actions);
  isTyping = false;
}

function handleQuickAction(text) {
  // Remove all quick action buttons
  document.querySelectorAll('.quick-actions').forEach(el => el.remove());
  addMessage(text, 'user');
  processInput(text);
}

async function goToStep(stepIndex) {
  if (isTyping) return;
  currentStep = stepIndex;
  renderSteps();
  document.querySelectorAll('.quick-actions').forEach(el => el.remove());
  await deliverStep(stepIndex);
}

async function deliverStep(step) {
  const responses = getStepContent(step);
  for (let i = 0; i < responses.length; i++) {
    const r = responses[i];
    await botRespond(r.content, r.actions || null, i === 0 ? 500 : 800);
  }
}

  if (lower.includes("tableau or streamlit") || lower.includes("which is better")) {

  <li>Click <strong>"Deploy"</strong> — it'll build and give you a public URL</li>
</ol>
<p>Your <code>requirements.txt</code> should include:</p>
<pre>streamlit
pandas
plotly
seaborn
matplotlib</pre>
<p>That's it — you now have a live dashboard you can link in your resume.</p>`,
    ["Dashboard done! Next step"]);
    return;
  }

  if (lower.includes("more example findings")) {
    await botRespond(`<p>Here are templates you can adapt with your actual numbers:</p>
<ul>
  <li><em>"Nurses and doctors report the highest average sleep quality (8.1/10 and 7.9/10 respectively), despite above-average stress levels, suggesting that high physical activity in these roles may offset stress effects."</em></li>
  <li><em>"78% of individuals with sleep apnea fall in the Overweight or Obese BMI category, compared to 34% of those without disorders — BMI screening could serve as an early warning indicator."</em></li>
  <li><em>"There is a clear stress threshold at level 7: average sleep quality drops from 7.2 to 5.4 between stress levels 6 and 8, indicating a non-linear tipping point rather than gradual decline."</em></li>
  <li><em>"Individuals averaging 60+ minutes of daily physical activity report 1.8 points higher sleep quality than those under 30 minutes, even after controlling for stress level."</em></li>
</ul>
<p>Replace the numbers with what your analysis actually shows — never fabricate data points.</p>`,
    ["Done! Let's polish everything"]);
    return;
  }

  if (lower.includes("audience") || lower.includes("who am i writing for")) {
    await botRespond(`<p>Pick one of these and write to them:</p>
<ul>
  <li><strong>Corporate Wellness Team</strong> — They want to know which employees are at risk and what programs to fund. Focus on occupation-based findings and stress interventions.</li>
  <li><strong>Health Insurance Company</strong> — They care about which factors predict disorders (risk pricing). Focus on the sleep disorder profiling and BMI connections.</li>
  <li><strong>HR Department</strong> — They want to reduce absenteeism and improve productivity. Focus on sleep quality by role and the cost of poor sleep.</li>
</ul>
<p>The specific audience doesn't matter as much as having <em>one</em> audience. It forces you to make your insights actionable instead of abstract.</p>`,
    ["Done! Let's polish everything"]);
    return;
  }

  if (lower.includes("other projects") || lower.includes("what else") || lower.includes("do next")) {
    await botRespond(`<p>Great question! For a strong portfolio, aim for 2–3 projects that show range. Now that you have this health/lifestyle project, consider:</p>
<ul>
  <li><strong>A SQL-heavy project</strong> — Use the Brazilian E-Commerce (Olist) dataset on Kaggle. Multiple tables that need joining, revenue analysis, customer segmentation. Shows you can work with relational data.</li>

  <li><strong>An A/B testing project</strong> — Find a conversion dataset and run hypothesis tests. Shows statistical literacy.</li>
</ul>
<p>Each project should demonstrate a different skill. Together, your sleep project + a SQL project + an A/B testing project covers everything most analyst roles ask for.</p>`,
    ["Start over from Step 1", "Thanks!"]);
    return;
  }

  if (lower.includes("thanks") || lower.includes("thank you")) {
    await botRespond(`<p>You're welcome! Good luck with the project. Remember the golden rule: <strong>ship it, then iterate.</strong> A complete project with clear insights is better than a perfect one that never gets finished. 🚀</p>

  if (lower.includes("which charts") || lower.includes("most important")) {

<ol>
  <li><strong>Correlation heatmap</strong> — Shows you understand relationships between variables at a glance</li>
  <li><strong>Sleep Quality by Occupation (box plot)</strong> — Tells a story about real-world impact</li>
  <li><strong>Stress vs. Sleep Quality (scatter with regression)</strong> — Your strongest finding, visualized</li>
  <li><strong>Sleep Disorder profiles (grouped bar chart)</strong> — Shows how groups differ</li>
  <li><strong>Your dashboard screenshot</strong> — Proves you can build an interactive product</li>
</ol>
<p>Put the top 2 in your GitHub README as images. They're what recruiters see first.</p>`,
    ["Ready for deep-dive analysis", "Show me Part C (Multivariate)"]);
    return;
  }

  // Default: send to Claude API
  await callClaude(text);
}

async function callClaude(userText) {
  isTyping = true;
  showTyping();

  const systemPrompt = `You are an interactive project guide helping someone build a data analysis portfolio project analyzing the "Sleep Health and Lifestyle Dataset" from Kaggle. The dataset has 374 rows with columns: Person ID, Gender, Age, Occupation, Sleep Duration, Quality of Sleep (1-10), Physical Activity Level (minutes/day), Stress Level (1-10), BMI Category, Blood Pressure, Heart Rate, Daily Steps, Sleep Disorder (None/Insomnia/Sleep Apnea).

The project has 7 steps: 1) Environment Setup, 2) Data Cleaning, 3) EDA, 4) Deep-Dive Analysis, 5) Dashboard, 6) Stakeholder Memo, 7) Polish & Publish.

Current step: ${currentStep >= 0 ? currentStep + 1 : 'not started'} (${currentStep >= 0 ? STEPS[currentStep].title : 'intro'}).

Keep responses focused, practical, and concise. Include code snippets when helpful. Format with HTML tags (p, strong, code, pre, ul, li, ol). Do not use markdown. Stay on topic — this is about the sleep analysis project. If they ask something unrelated, gently redirect.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [
          ...conversationHistory.slice(-6),
          { role: "user", content: userText }
        ],
      }),
    });

    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || "I couldn't process that. Try asking about a specific step or type 'next' to continue.";

    conversationHistory.push({ role: "user", content: userText });
    conversationHistory.push({ role: "assistant", content: reply });

    removeTyping();
    addMessage(reply, 'bot');
    isTyping = false;
  } catch (err) {
    removeTyping();
    addMessage(`<p>I couldn't connect to the AI service right now. But you can still navigate the guide using the sidebar or try these:</p>`, 'bot', 
      ["Next step", "Start over from Step 1", "What does the data look like?"]);
    isTyping = false;
  }
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const hasImages = pendingImages.length > 0;

  if (!text && !hasImages) return;
  if (isTyping) return;

  // Build user message HTML with images
  let userHTML = '';
  const imagesToSend = [...pendingImages];

  if (hasImages) {
    userHTML += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">';
    imagesToSend.forEach(img => {
      userHTML += `<img src="${img.previewUrl}" class="msg-image" onclick="openLightbox('${img.previewUrl}')" alt="Uploaded screenshot">`;
    });
    userHTML += '</div>';
  }
  if (text) {
    userHTML += `<p>${text}</p>`;
  }

  addMessage(userHTML, 'user');
  input.value = '';
  input.style.height = 'auto';
  pendingImages = [];
  renderImagePreviews();

  // If images are attached, always go to Claude API with vision
  if (hasImages) {
    callClaudeWithImages(text || "What do you see in this screenshot? Please give me feedback.", imagesToSend);
  } else {
    processInput(text);
  }
}

async function callClaudeWithImages(userText, images) {
  isTyping = true;
  showTyping();

  const systemPrompt = `You are an interactive project guide helping someone build a data analysis portfolio project analyzing the "Sleep Health and Lifestyle Dataset" from Kaggle. The dataset has 374 rows with columns: Person ID, Gender, Age, Occupation, Sleep Duration, Quality of Sleep (1-10), Physical Activity Level (minutes/day), Stress Level (1-10), BMI Category, Blood Pressure, Heart Rate, Daily Steps, Sleep Disorder (None/Insomnia/Sleep Apnea).

The project has 7 steps: 1) Environment Setup, 2) Data Cleaning, 3) EDA, 4) Deep-Dive Analysis, 5) Dashboard, 6) Stakeholder Memo, 7) Polish & Publish.

Current step: ${currentStep >= 0 ? currentStep + 1 : 'not started'} (${currentStep >= 0 ? STEPS[currentStep].title : 'intro'}).

The user has shared a screenshot. Analyze it in the context of their sleep analysis project. If it's code, check for errors or suggest improvements. If it's a chart or visualization, give feedback on clarity, design, labeling, and what insight it communicates. If it's an error message, help debug it. If it's a dashboard, evaluate the layout and suggest improvements. If it's something else, describe what you see and relate it to the project where possible.

Keep responses focused, practical, and concise. Format with HTML tags (p, strong, code, pre, ul, li, ol). Do not use markdown.`;

  // Build content array with images and text
  const contentBlocks = [];
  images.forEach(img => {
    contentBlocks.push({
      type: "image",
      source: { type: "base64", media_type: img.mediaType, data: img.base64 }
    });
  });
  contentBlocks.push({ type: "text", text: userText });

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [
          ...conversationHistory.slice(-4),
          { role: "user", content: contentBlocks }
        ],
      }),
    });

    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || "I couldn't analyze that image. Try uploading a clearer screenshot or ask a specific question about it.";

    conversationHistory.push({ role: "user", content: userText + " [attached screenshot]" });
    conversationHistory.push({ role: "assistant", content: reply });

    removeTyping();
    addMessage(reply, 'bot');
    isTyping = false;
  } catch (err) {
    removeTyping();
    addMessage(`<p>I couldn't process the image right now. Try again, or describe what's in the screenshot and I can help that way.</p>`, 'bot',
      ["Next step", "I have an error to debug"]);
    isTyping = false;
  }
}

function resetChat() {
  currentStep = -1;
  conversationHistory = [];
  clearState();
  document.getElementById('messages').innerHTML = '';
  renderSteps();
  init();
}

// Auto-resize textarea
const input = document.getElementById('userInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function init() {
  const savedHTML = loadState();
  if (savedHTML) {
    // Restore previous session
    document.getElementById('messages').innerHTML = savedHTML;
    renderSteps();
    // Re-attach quick-action click handlers (they use inline onclick, so they work)
    const container = document.getElementById('messages');
    container.scrollTop = container.scrollHeight;
    return;
  }

  renderSteps();
  await botRespond(
    `<p>Welcome! 👋 I'm your interactive guide for building a <strong>Sleep Quality Analysis</strong> portfolio project.</p>
<p>This project uses the <strong>Sleep Health and Lifestyle Dataset</strong> from Kaggle to answer: <em>What lifestyle factors most strongly predict sleep quality and sleep disorders?</em></p>
<p>By the end, you'll have a complete portfolio piece with a Python notebook, interactive dashboard, and stakeholder memo — everything a hiring manager wants to see.</p>
<p>I'll walk you through 7 steps. You can ask me questions at any time, click steps in the sidebar, or just type <strong>"next"</strong> to keep moving. You can also <strong>upload screenshots</strong> of your code, charts, errors, or dashboard using the 📎 button, pasting, or dragging an image in — and I'll give you feedback.</p>`,
    ["Let's start!", "What does the data look like?", "What tools do I need?"],
    300
  );
}
